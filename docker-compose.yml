version: '3.8'

services:
  librarium:
    build: .
    image: librarium:latest
    container_name: librarium
    ports:
      - "8080:8080"
    volumes:
      - librarium_data:/data
      # Uncomment to mount local vault directory:
      # - ./my-vaults:/data/vaults
    environment:
      - LIBRARIUM__SERVER__HOST=0.0.0.0
      - LIBRARIUM__SERVER__PORT=8080
      - LIBRARIUM__DATABASE__PATH=/data/librarium.db
      - LIBRARIUM__VAULT__BASE_DIR=/data/vaults
      - LIBRARIUM__AUTH__ENABLED=true
      - LIBRARIUM__AUTH__BOOTSTRAP_ADMIN_USERNAME=admin
      # IMPORTANT: Change this before first run, then remove it.
      - LIBRARIUM__AUTH__BOOTSTRAP_ADMIN_PASSWORD=changeme-on-first-login
      # Generate a stable secret: openssl rand -hex 32
      # - LIBRARIUM__AUTH__JWT_SECRET=your-secret-here
      # Override config file path (default: /data/config.toml via CMD --config)
      # - LIBRARIUM_CONFIG=/data/config.toml
      - RUST_LOG=info
      # Rate limiting (requests per 60-second window per IP)
      - RATE_LIMIT_REQUESTS=120
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

volumes:
  librarium_data:
