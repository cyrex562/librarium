name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Server binary — Linux (x86_64-unknown-linux-gnu) ───────────────────────
  server-linux:
    name: Server – Linux x86_64
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: server-linux

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libssl-dev pkg-config libsqlite3-dev libsasl2-dev

      - name: Build server (release)
        run: cargo build --release -p librarium-server

      - name: Package .deb
        run: bash scripts/package-server-deb.sh "${{ github.ref_name }}"

      - name: Rename binary with version + platform suffix
        run: |
          cp target/release/librarium \
             dist/librarium-${{ github.ref_name }}-linux-x86_64

      - uses: actions/upload-artifact@v4
        with:
          name: server-linux
          path: |
            dist/librarium-${{ github.ref_name }}-linux-x86_64
            dist/librarium_*_amd64.deb

  # ── Server binary — Windows (x86_64-pc-windows-msvc) ──────────────────────
  server-windows:
    name: Server – Windows x86_64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: server-windows

      - name: Build server (release)
        run: cargo build --release -p librarium-server

      - name: Stage artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item target\release\librarium.exe `
            dist\librarium-${{ github.ref_name }}-windows-x86_64.exe
          Copy-Item scripts\install-service-windows.ps1 dist\

      - uses: actions/upload-artifact@v4
        with:
          name: server-windows
          path: |
            dist/librarium-${{ github.ref_name }}-windows-x86_64.exe
            dist/install-service-windows.ps1

  # ── Desktop (Tauri) — Linux (AppImage + .deb) ─────────────────────────────
  desktop-linux:
    name: Desktop – Linux (AppImage + deb)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: desktop-linux

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            pkg-config \
            libsqlite3-dev \
            libsasl2-dev \
            patchelf

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: npm ci && npm run build

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version '^2' --locked

      - name: Build desktop bundles (AppImage + deb)
        working-directory: crates/librarium-tauri
        run: cargo tauri build --bundles appimage,deb

      - name: Stage artifacts
        run: |
          mkdir -p dist
          cp target/release/bundle/appimage/*.AppImage \
             dist/Librarium-${{ github.ref_name }}-linux-x86_64.AppImage
          cp target/release/bundle/deb/*.deb \
             dist/Librarium-${{ github.ref_name }}-linux-x86_64.deb

      - uses: actions/upload-artifact@v4
        with:
          name: desktop-linux
          path: |
            dist/Librarium-${{ github.ref_name }}-linux-x86_64.AppImage
            dist/Librarium-${{ github.ref_name }}-linux-x86_64.deb

  # ── Desktop (Tauri) — Windows (NSIS installer) ────────────────────────────
  desktop-windows:
    name: Desktop – Windows (NSIS)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: desktop-windows

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: npm ci && npm run build

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version '^2' --locked

      - name: Build desktop bundle (NSIS)
        working-directory: crates/librarium-tauri
        run: cargo tauri build --bundles nsis

      - name: Stage artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $src = Get-ChildItem -Path target\release\bundle\nsis\*.exe | Select-Object -First 1
          Copy-Item $src.FullName `
            dist\Librarium-${{ github.ref_name }}-windows-x86_64-setup.exe

      - uses: actions/upload-artifact@v4
        with:
          name: desktop-windows
          path: dist/Librarium-${{ github.ref_name }}-windows-x86_64-setup.exe

  # ── Server — Windows portable zip ─────────────────────────────────────────
  server-windows-portable:
    name: Server – Windows portable (zip)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: server-windows-portable

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build portable server package
        shell: pwsh
        run: pwsh scripts/build-portable.ps1 -OutDir dist/portable

      - name: Zip portable package
        shell: pwsh
        run: |
          Compress-Archive -Path dist/portable/* `
            -DestinationPath dist/Librarium-${{ github.ref_name }}-windows-x86_64-portable.zip

      - uses: actions/upload-artifact@v4
        with:
          name: server-windows-portable
          path: dist/Librarium-${{ github.ref_name }}-windows-x86_64-portable.zip

  # ── Desktop — Windows portable zip ────────────────────────────────────────
  desktop-windows-portable:
    name: Desktop – Windows portable (zip)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: desktop-windows-portable

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build portable desktop package
        shell: pwsh
        run: pwsh scripts/build-portable-desktop.ps1 -OutDir dist/portable-desktop

      - name: Zip portable package
        shell: pwsh
        run: |
          Compress-Archive -Path dist/portable-desktop/* `
            -DestinationPath dist/Librarium-${{ github.ref_name }}-windows-x86_64-desktop-portable.zip

      - uses: actions/upload-artifact@v4
        with:
          name: desktop-windows-portable
          path: dist/Librarium-${{ github.ref_name }}-windows-x86_64-desktop-portable.zip

  # ── GitHub Release — publish all artifacts ────────────────────────────────
  release:
    name: Publish GitHub Release
    needs: [server-linux, server-windows, desktop-linux, desktop-windows, server-windows-portable, desktop-windows-portable]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifact tree
        run: |
          mkdir -p release-assets
          find artifacts -type f | xargs -I{} cp {} release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
          fail_on_unmatched_files: true
